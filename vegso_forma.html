<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="vegso_forma.css">
    <title>To-Do</title>
</head>
<body>
<div class="main-container">

    <!-- Bevitel sor -->
    <div id="bevitel">
        <input type="text" id="input" placeholder="Írj egy taskot..." maxlength="11">
        
        <select id="listaSelect">
            <option value="suli">Suli</option>
            <option value="bevasarlas">Bevásárló lista</option>
            <option value="sport">Sport</option>
            <option value="etkezesi_terv">Étkezési terv</option>
            <option value="bakancs">Bakancslista</option>
        </select>
    </div>

    <!-- Kategóriák -->
    <div id="Kategoriak">
        <div class="kat">
            <p>Suli</p>
            <ul id="suli"></ul>
        </div>

        <div class="kat">
            <p>Bevásárló Lista</p>
            <ul id="bevasarlas"></ul>
        </div>

        <div class="kat">
            <p>Sport</p>
            <ul id="sport"></ul>
        </div>

        <div class="kat">
            <p>Étkezési terv</p>
            <ul id="etkezesi_terv"></ul>
        </div>

        <div class="kat">
            <p>Bakancslista</p>
            <ul id="bakancs"></ul>
        </div>
    </div>

    <!-- Gombok -->
    <div id="_gombok">
        <button type="button" id="all-check">all-checked</button>
        <button type="button" id="all-uncheck">all-unchecked</button>
        <button type="button" id="delete-all">delete-all</button>
    </div>
</div>

<script src="vegso_forma.js"></script>
</body>
</html>
