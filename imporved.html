<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do</title>
    <style>
        body{
            margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f5f5f5;
        }
        form div{
            height: 260px;
            width: 185px;
            border-radius: 5px;
            background-color: gray;
           
        }
        form{
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 800px;
            justify-content: center;
        }
        input,select{
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }
        div p{
            margin-right: auto;
        }
        navbar {
    background: #1A1A1A;
    padding: 10px;
    color: white;
}

.menu-icon {
    position: fixed;   /* 👈 important */
    top: 15px;         /* distance from top */
    left: 15px;        /* distance from left */
    font-size: 28px;
    cursor: pointer;
    color: gray;
    z-index: 1000;     /* stay above everything */
}

/* Side menu */
.side-menu {
    position: fixed;
    top: 0;
    left: -250px; /* hidden */
    width: 250px;
    height: 100%;
    background: #2D2D2D;
    padding-top: 60px;
    transition: 0.3s;
}

.side-menu a {
    display: block;
    color: white;
    padding: 15px;
    text-decoration: none;
}

.side-menu a:hover {
    background: #444;
}
    </style>
</head>
<body>
    <div class="navbar">
    <div class="menu-icon" onclick="toggleMenu()">
        ☰
    </div>
</div>



    <form>
        <input type="text" id="fasz">
        <Select id="listaSelect">
            <option value="1">Suli</option>
            <option value="2">Bevásárló lista</option>
            <option value="3">Sport</option>
            <option value="4">Kaják</option>
            <option value="5">Bakancslista</option>
        </Select>
        <div id="sideMenu" class="side-menu">
    <a href="#">Home</a>
    <a href="#">Suli</a>
    <a href="#">Bevásárló Lista</a>
    <a href="#">Sport</a>
    <a href="#">Kaják</a>
</div>
        <div id="suli">
            <ul>
                <p>Suli</p>
            </ul>
        </div>
        <div>
            <ul>
                <p>Bevásárló Lista</p>
            </ul>
        </div>
        <div>
            <ul>
                <p>Sport</p>
            </ul>
        </div>
        <div>
            <ul>
                <p>Kaják</p>
            </ul>
        </div>
        <div>
            <ul>
                <p>Bakancslista</p>
            </ul>
        </div>


    </form>

<script src="improved.js">
    
</script>

</body>
</html>
