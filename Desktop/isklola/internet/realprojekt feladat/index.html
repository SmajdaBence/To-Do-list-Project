<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div>
        <input id="input" type="text" placeholder="Enter your task..." maxlength="38">
        <ul id="task-list"></ul>
        <br>
        <span>
            <button id="all-check" style="background: #4A4F49;">all-checked</button>
            <button id="all-uncheck" style="background: #4A4F49;">all-unchecked</button>
            <button id="delete-all" style="background: #4A4F49;">delete-all</button>
        </span>
    </div>

    <script src="index.js"></script>
</body>
</html>
